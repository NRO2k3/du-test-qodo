[config]
response_language = "vi-VN"

[pr_reviewer]
require_score_review = false
require_tests_review = false
require_estimate_effort_to_review = false
require_can_be_split_review = false
require_security_review = false
require_ticket_analysis_review = false
enable_review_labels_security = false
enable_review_labels_effort = false
enable_intro_text = false
enable_help_text = false
final_update_message = false
num_max_findings = 50
tcct_report_format = true
tcct_report_checklist = [
  { category = "Chất lượng & logic code", item = "Logic rõ ràng, không dư thừa" },
  { category = "Chất lượng & logic code", item = "Tên biến, tên hàm, tên file có ý nghĩa" },
  { category = "Chất lượng & logic code", item = "Tránh lặp code - đã tách thành hàm/chung logic" },
  { category = "Chất lượng & logic code", item = "Code dễ đọc, dễ hiểu" },
  { category = "Chất lượng & logic code", item = "Không sử dụng magic number/string" },
  { category = "Cấu trúc & tổ chức file", item = "Cấu trúc thư mục hợp lý theo kiến trúc dự án" },
  { category = "Cấu trúc & tổ chức file", item = "Đặt file đúng module/layer" },
  { category = "Cấu trúc & tổ chức file", item = "Không có file hoặc function không sử dụng" },
  { category = "Cấu trúc & tổ chức file", item = "Code được chia nhỏ hợp lý" },
  { category = "Hiệu năng", item = "Tối ưu vòng lặp, truy vấn, xử lý dữ liệu" },
  { category = "Hiệu năng", item = "Không gây N+1 query" },
  { category = "Hiệu năng", item = "Không tạo object/tính toán không cần thiết" },
  { category = "Hiệu năng", item = "Xử lý async hợp lý" },
  { category = "Bảo mật", item = "Validate input người dùng" },
  { category = "Bảo mật", item = "Không để lộ key/token/mật khẩu trong code" },
  { category = "Bảo mật", item = "Dùng ENV cho thông tin nhạy cảm" },
  { category = "Bảo mật", item = "Tránh SQL Injection" },
  { category = "Bảo mật", item = "Không log dữ liệu nhạy cảm" },
  { category = "Xử lý lỗi", item = "Xử lý các case lỗi đầy đủ" },
  { category = "Xử lý lỗi", item = "Sử dụng try/catch hoặc middleware" },
  { category = "Xử lý lỗi", item = "Đẩy ra code lỗi và thống nhất với FE map thông điệp cụ thể" },
  { category = "Style Guide", item = "Format code đúng chuẩn" },
  { category = "Style Guide", item = "Dùng style thống nhất trong team" },
  { category = "Style Guide", item = "Không có code comment thừa" },
  { category = "Tính mở rộng", item = "Code dễ mở rộng về sau" },
  { category = "Tính mở rộng", item = "Không hard-code Tiếng Việt, sử dụng i18n (thông qua file message.properties) để map key" },
  { category = "Tính mở rộng", item = "Dùng đúng design pattern" },
  { category = "Tính mở rộng", item = "Không còn duplication/unreachable code" },
  { category = "Backend", item = "API đúng format trả về (ApiResponse)" },
  { category = "Backend", item = "Đặt tên endpoint đúng RESTful mà framework đã gen code" },
  { category = "Backend", item = "Validation đầu vào đủ" },
  { category = "Backend", item = "Check quyền đầy đủ cho mỗi request sử dụng VAuthz" },
  { category = "Backend", item = "Logging + error tracking hợp lý" },
  { category = "Backend", item = "Tối ưu cache/timeout" },
  { category = "Unit test", item = "Tối thiểu 50%" },
]

extra_instructions = """
Bạn là Senior Java/Spring Boot source-code reviewer, review theo style report của folder tcct-be.

Ưu tiên review:
- Security: thiếu authentication/authorization, IDOR, parameter tampering, tenant/project/department isolation, dữ liệu nhạy cảm bị trả về/log, hard-code secret, SQL/JPQL injection, SSRF, upload/download unsafe, CORS quá rộng.
- API & DTO: request/response không qua DTO rõ ràng, bind trực tiếp entity/model, thiếu validation, trả raw object thay vì ApiResponse, response format không ổn định, status code sai, pagination/sort/filter contract sai.
- Database: ID không dùng UUID, PK/FK naming sai, thiếu audit fields created_at/created_by/modified_at/modified_by, enum/status tự invent, query nối chuỗi input, query trong loop, unpaged query.
- Performance: N+1 query, DB/external call trong loop, materialize toàn bộ dữ liệu, export/import nặng memory, thiếu batch query/cache/timeout.
- Spring/MVC architecture: controller chứa business logic, service phụ thuộc controller, service làm trách nhiệm repository/controller, transaction boundary sai, exception handling không thống nhất.
- Maintainability: duplicate logic, magic string/number, long method, nhiều responsibility, unused function, hard-code config, naming không theo convention.
"""
